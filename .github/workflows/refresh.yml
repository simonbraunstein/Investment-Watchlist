name: Daily Watchlist Refresh

on:
  schedule:
    # 00:07 UTC = 1:07am BST in summer / 12:07am GMT in winter.
    # GitHub cron is UTC-only and the :00 slot is heavily congested (runs can
    # be delayed 15-60 min or skipped), so we schedule at :07 off-peak.
    - cron: '7 0 * * *'
    # Backup trigger — GitHub occasionally drops scheduled runs entirely.
    # The script exits in seconds if the 00:07 run already succeeded today.
    - cron: '37 4 * * *'
  workflow_dispatch:
    inputs:
      depth:
        description: 'fast = quick manual refresh (~15 min); deep = full self-repair pass (slow)'
        type: choice
        options: [fast, deep]
        required: false
        default: fast

# Never let two refreshes (daily/quality/manual) write to the sheet or push
# to git at the same time — later runs queue instead of colliding.
concurrency:
  group: watchlist-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            "requests==2.31.0" \
            "gspread==6.1.2" \
            "google-auth==2.29.0" \
            "numpy==1.26.4" \
            "pandas==2.2.3" \
            "yfinance==0.2.51"

      - name: Run daily refresh
        env:
          FMP_API_KEY:                 ${{ secrets.FMP_API_KEY }}
          TWELVEDATA_API_KEY:          ${{ secrets.TWELVEDATA_API_KEY }}
          ROIC_API_KEY:                ${{ secrets.ROIC_API_KEY }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FINNHUB_API_KEY:             ${{ secrets.FINNHUB_API_KEY }}
          REFRESH_MODE:                daily
          # Scheduled runs get the deep self-repair pass; manual runs default fast
          REFRESH_DEPTH:               ${{ github.event.inputs.depth || 'deep' }}
          PYTHONUNBUFFERED:            "1"
        run: python refresh.py

      - name: Commit updated dashboard
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Daily refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
