name: Daily Watchlist Refresh

on:
  schedule:
    # 5am UTC = 6am UK time (weekdays)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual refresh'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth numpy

      - name: Run daily refresh (technicals + analyst + scores)
        env:
          FMP_API_KEY:                 ${{ secrets.FMP_API_KEY }}
          TWELVEDATA_API_KEY:          ${{ secrets.TWELVEDATA_API_KEY }}
          ROIC_API_KEY:                ${{ secrets.ROIC_API_KEY }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          REFRESH_MODE:                daily
        run: python refresh.py

      - name: Commit updated dashboard
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Daily refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
