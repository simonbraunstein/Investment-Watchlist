name: Weekly Quality Metrics Refresh

on:
  schedule:
    - cron: '0 23 * * 6'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            "requests==2.31.0" \
            "gspread==6.1.2" \
            "google-auth==2.29.0" \
            "numpy==1.26.4" \
            "pandas==2.2.3" \
            "yfinance==0.2.51"

      - name: Run quality metrics refresh
        env:
          FMP_API_KEY:                 ${{ secrets.FMP_API_KEY }}
          TWELVEDATA_API_KEY:          ${{ secrets.TWELVEDATA_API_KEY }}
          ROIC_API_KEY:                ${{ secrets.ROIC_API_KEY }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          REFRESH_MODE:                quality
          PYTHONUNBUFFERED:            "1"
        run: python refresh.py

      - name: Commit updated dashboard
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Quality refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
